<!doctype html>
<html>
  <head>
    <title>Sanguine Register</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
<body class="auth-body">
    <div class="auth-card" style="max-width: 650px;">
        <h2>CREATE ACCOUNT</h2>

        <div class="form-container" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; box-shadow: none; padding: 0;">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="name" placeholder="John Doe" required />
            </div>

            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="johndoe123" required />
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required />
            </div>

            <div class="form-group">
                <label>Email ID</label>
                <input type="email" id="gmail" placeholder="example@gmail.com" required />
            </div>

            <div class="form-group">
                <label>Mobile Number</label>
                <input type="tel" id="mobile_no" placeholder="10-digit number" pattern="[0-9]{10}" maxlength="10" required />
            </div>

            <div class="form-group">
                <label>Blood Type</label>
                <div class="blood-group">
                    <input type="radio" id="a_plus" name="blood" value="A+" /><label for="a_plus" class="blood-btn">A+</label>
                    <input type="radio" id="a_minus" name="blood" value="A-" /><label for="a_minus" class="blood-btn">A-</label>
                    <input type="radio" id="b_plus" name="blood" value="B+" /><label for="b_plus" class="blood-btn">B+</label>
                    <input type="radio" id="b_minus" name="blood" value="B-" /><label for="b_minus" class="blood-btn">B-</label>
                    <input type="radio" id="o_plus" name="blood" value="O+" /><label for="o_plus" class="blood-btn">O+</label>
                    <input type="radio" id="o_minus" name="blood" value="O-" /><label for="o_minus" class="blood-btn">O-</label>
                    <input type="radio" id="ab_plus" name="blood" value="AB+" /><label for="ab_plus" class="blood-btn">AB+</label>
                    <input type="radio" id="ab_minus" name="blood" value="AB-" /><label for="ab_minus" class="blood-btn">AB-</label>
                </div>
            </div>

            <div class="form-group">
                <label>District</label>
                <select id="district" required>
                    <option value="">Select District</option>
                </select>
            </div>

            <div class="form-group">
                <label>City</label>
                <select id="city" required>
                    <option value="">Select City</option>
                </select>
            </div>
            
            <button style="grid-column: span 2;" onclick="register()">Register Now</button>
        </div>

        <div class="link-text">
            Already have an account? <a href="login.html">Login here</a>
        </div>
    </div>
    <script src="register.js"></script>
</body>
</html>
