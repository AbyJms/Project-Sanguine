<!doctype html>
<html>
  <head>
    <title>Sanguine - Check Eligibility</title>
    <link rel="stylesheet" href="../css/style.css" />
    <style>
      .status-message {
        padding: 20px;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        text-align: center;
        margin-top: 20px;
      }
      .eligible {
        background: #e6f4ea;
        color: #2b9348;
        border: 2px solid #2b9348;
      }
      .not-eligible {
        background: #fdeaea;
        color: #8b0000;
        border: 2px solid #8b0000;
      }
    </style>
  </head>
  <body>
    <div class="sidebar">
      <h2>Sanguine</h2>
      <a href="home.html">Home</a>
      <a href="profile.html">Profile</a>
      <a href="history.html">History</a>
      <a href="notifications.html">Notifications</a>
      <a href="#" onclick="logout(); return false;" style="margin-top: auto;">Logout</a>
    </div>

    <div class="main">
      <h1>Check Donation Eligibility</h1>
      
      <div class="form-container small">
        <div class="form-group">
          <label for="lastDonation">Last Donation Date:</label>
          <input type="date" id="lastDonation" />
        </div>

        <button onclick="checkEligibility()">Check Status</button>

        <!-- Result will appear here -->
        <div id="result"></div>
      </div>
    </div>

    <script src="../auth.js"></script>
    <script src="../logout.js"></script>
    <script>
      function checkEligibility() {
        const lastDonation = document.getElementById("lastDonation").value;
        const resultDiv = document.getElementById("result");

        if (!lastDonation) {
          resultDiv.innerHTML =
            "<p class='status-message not-eligible'>Please select a date.</p>";
          return;
        }

        const lastDate = new Date(lastDonation);
        const today = new Date();

        const diffTime = today - lastDate;
        const diffDays = diffTime / (1000 * 60 * 60 * 24);

        if (diffDays >= 90) {
          resultDiv.innerHTML =
            "<p class='status-message eligible'>You are eligible to donate blood.</p>";
        } else {
          const remaining = Math.ceil(90 - diffDays);
          resultDiv.innerHTML =
            "<p class='status-message not-eligible'>You are not eligible yet. Please wait " +
            remaining +
            " more days.</p>";
        }
      }
    </script>
  </body>
</html>
