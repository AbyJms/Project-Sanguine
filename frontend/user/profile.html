<!DOCTYPE html>
<html>

<head>
  <title>Profile</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>

<body>
  <div class="sidebar">
    <h2>Sanguine</h2>
    <a href="home.html">Home</a>
    <a href="profile.html">Profile</a>
    <a href="history.html">History</a>
    <a href="notifications.html">Notifications</a>
    <a href="#" onclick="logout(); return false;" style="margin-top: auto;">Logout</a>
  </div>

  <div class="main">
    <h1>Your Profile</h1>
    <div class="card" style="max-width: 800px; padding: 50px;">
      <div style="margin-bottom: 40px; font-size: 18px;">
        <div style="display: flex; justify-content: space-between; border-bottom: 1px solid #f0f0f0; padding: 20px 0;">
          <strong style="color: #333;">Username:</strong> 
          <span id="pUsername" style="color: #666; font-weight: 500;"></span>
        </div>
        <div style="display: flex; justify-content: space-between; border-bottom: 1px solid #f0f0f0; padding: 20px 0;">
          <strong style="color: #333;">Name:</strong> 
          <span id="pName" style="color: #666; font-weight: 500;"></span>
        </div>
        <div style="display: flex; justify-content: space-between; border-bottom: 1px solid #f0f0f0; padding: 20px 0;">
          <strong style="color: #333;">Blood Type:</strong> 
          <span id="pBlood" style="color: #8b0000; font-weight: 700; font-size: 20px;"></span>
        </div>
        <div style="display: flex; justify-content: space-between; border-bottom: 1px solid #f0f0f0; padding: 20px 0;">
          <strong style="color: #333;">Email:</strong> 
          <span id="pEmail" style="color: #666; font-weight: 500;"></span>
        </div>
        <div style="display: flex; justify-content: space-between; border-bottom: 1px solid #f0f0f0; padding: 20px 0;">
          <strong style="color: #333;">Mobile:</strong> 
          <span id="pMobile" style="color: #666; font-weight: 500;"></span>
        </div>
        <div style="display: flex; justify-content: space-between; border-bottom: 1px solid #f0f0f0; padding: 20px 0;">
          <strong style="color: #333;">District:</strong> 
          <span id="pDistrict" style="color: #666; font-weight: 500;"></span>
        </div>
        <div style="display: flex; justify-content: space-between; padding: 20px 0;">
          <strong style="color: #333;">City:</strong> 
          <span id="pCity" style="color: #666; font-weight: 500;"></span>
        </div>
      </div>

      <button style="font-size: 18px; padding: 18px 36px; display: block; width: 100%; border-radius: 12px;" onclick="location.href = 'edit-profile.html'">
        Edit Profile
      </button>
    </div>
  </div>
  
  <script src="../auth.js"></script>
  <script src="../logout.js"></script>
  <script src="../profile.js"></script>
</body>

</html>
