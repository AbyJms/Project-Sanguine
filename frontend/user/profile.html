<!DOCTYPE html>
<html>

<head>
  <title>Profile</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>

<body>
  <div class="sidebar">
    <h2>Sanguine</h2>
    <a href="home.html">Home</a>
    <a href="profile.html">Profile</a>
    <a href="history.html">History</a>
    <a href="notifications.html">Notifications</a>
    <a href="#" onclick="logout(); return false;" style="margin-top: auto;">Logout</a>
  </div>

  <div class="main">
    <h1>Your Profile</h1>
    <div class="card" style="max-width: 600px;">
      <div style="margin-bottom: 30px; line-height: 2.2; font-size: 16px;">
        <p><strong>Username:</strong> <span id="pUsername" style="color: #666; margin-left: 10px;"></span></p>
        <p><strong>Name:</strong> <span id="pName" style="color: #666; margin-left: 10px;"></span></p>
        <p><strong>Blood Type:</strong> <span id="pBlood" style="color: #666; margin-left: 10px;"></span></p>
        <p><strong>Email:</strong> <span id="pEmail" style="color: #666; margin-left: 10px;"></span></p>
        <p><strong>Mobile:</strong> <span id="pMobile" style="color: #666; margin-left: 10px;"></span></p>
        <p><strong>District:</strong> <span id="pDistrict" style="color: #666; margin-left: 10px;"></span></p>
        <p><strong>City:</strong> <span id="pCity" style="color: #666; margin-left: 10px;"></span></p>
      </div>

      <button onclick="location.href = 'edit-profile.html'">
        Edit Profile
      </button>
    </div>
  </div>
  
  <script src="../auth.js"></script>
  <script src="../logout.js"></script>
  <script src="../profile.js"></script>
</body>

</html>
