<!doctype html>
<html>

<head>
  <title>Hospital Dashboard</title>
  <link rel="stylesheet" href="../css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
  <div class="sidebar">
    <h2>Sanguine</h2>
    <a href="home.html">Home</a>
    <a href="donor-list.html">Donor List</a>
    <!-- <a href="upload-result.html">Upload Result</a> -->
    <a href="update-status.html">Update Status</a>
    <a href="request.html">Request</a>
    <a href="#" onclick="logout(); return false;" style="margin-top: auto;">Logout</a>
  </div>

  <div class="main">
    <h1>HOSPITAL</h1>

    <div class="graph-section">
      <h2>Blood Requests Overview</h2>
      <div class="graph-card">
        <canvas id="requestChart"></canvas>
      </div>
    </div>

    <div class="card-container">
      <div class="card">
        <h3>View Donor List</h3>
        <p>See available donors and details.</p>
      </div>

      <div class="card">
        <h3>Upload Result</h3>
        <p>Upload medical/test results and update eligibility.</p>
      </div>

      <div class="card">
        <h3>Update Status</h3>
        <p>Update request status.</p>
      </div>

      <div class="card">
        <h3>Request Blood</h3>
        <p>Create a new blood request.</p>
      </div>
    </div>
  </div>
  <script>
    async function loadRequests() {
      const token = localStorage.getItem("token");
      try {
        const res = await fetch("http://localhost:5000/api/hospital/request-stats", {
          headers: { Authorization: "Bearer " + token }
        });
        
        if (!res.ok) {
           console.error("API error:", res.status);
           return;
        }
        const data = await res.json();
        console.log("Stats Data:", data);

        const stats = data.stats;
        const distName = data.districtName || "Current District";

        // Prepare labels and data for Chart.js
        const labels = stats.map(s => s.month);
        const counts = stats.map(s => parseInt(s.count));

        const ctx = document.getElementById('requestChart').getContext('2d');
        if (window.myChart) window.myChart.destroy(); // Prevent memory leak

        window.myChart = new Chart(ctx, {
          type: 'line',
          data: {
            labels: labels.length ? labels : ['No Data'],
            datasets: [{
              label: `Blood Requests (${distName})`,
              data: counts.length ? counts : [0],
              borderColor: '#8b0000',
              backgroundColor: 'rgba(139, 0, 0, 0.1)',
              borderWidth: 3,
              tension: 0.4,
              fill: true,
            }]
          },
          options: { 
            responsive: true, 
            maintainAspectRatio: false,
            scales: {
              y: {
                beginAtZero: true,
                ticks: { stepSize: 1, precision: 0 }
              }
            }
          }
        });
      } catch (err) {
        console.error("STATS ERROR:", err);
      }
    }
    loadRequests();


  </script>

  <script src="../auth.js"></script>
  <script src="../logout.js"></script>
</body>

</html>
