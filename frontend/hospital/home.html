<!doctype html>
<html>
  <head>
    <title>Hospital Dashboard</title>
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <div class="sidebar">
      <h2>Sanguine</h2>
      <a href="home.html">Home</a>
      <a href="donor-list.html">Donor List</a>
      <a href="upload-result.html">Upload Result</a>
      <a href="update-status.html">Update Status</a>
      <a href="request.html">Request</a>
    </div>

    <div class="main">
      <h1>HOSPITAL</h1>

      <div class="graph-section">
         <h2>Blood Requests Overview</h2>
         <div class="graph-card">
           <canvas id="requestChart"></canvas>
         </div>
      </div>

      <div class="card-container">
        <div class="card">
          <h3>View Donor List</h3>
          <p>See available donors and details.</p>
        </div>

        <div class="card">
          <h3>Upload Result</h3>
          <p>Upload medical/test results and update eligibility.</p>
        </div>

        <div class="card">
          <h3>Update Status</h3>
          <p>Update request status.</p>
        </div>

        <div class="card">
          <h3>Request Blood</h3>
          <p>Create a new blood request.</p>
        </div>
      </div>
    </div>
    <script>
  const ctx = document.getElementById('requestChart').getContext('2d');

  new Chart(ctx, {
    type: 'line',
    data: {
      labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
      datasets: [{
        label: 'Blood Requests',
        data: [12, 19, 8, 15, 22, 18],
        borderColor: '#8b0000',
        backgroundColor: 'rgba(139, 0, 0, 0.1)',
        borderWidth: 3,
        tension: 0.4,
        fill: true,
        pointBackgroundColor: '#8b0000',
        pointRadius: 5
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          display: true
        }
      },
      scales: {
        y: {
          beginAtZero: true
        }
      }
    }
  });
   </script>
  </body>
</html>
