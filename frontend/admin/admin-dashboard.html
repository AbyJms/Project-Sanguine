<!doctype html>
<html>

<head>
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="../css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
  <div class="sidebar">
    <h2>Admin</h2>
    <a href="admin-dashboard.html">Home</a>
    <a href="register-hospital.html">Register Hospital</a>
    <a href="register-admin.html">Register Admin</a>
    <a href="view-users.html">View Users</a>
    <a href="#" onclick="logout(); return false;" style="margin-top: auto;">Logout</a>
  </div>

  <div class="main">
    <h1>ADMIN DASHBOARD</h1>

    <!-- ================= STACKED GRAPH (FULL WIDTH TOP) ================= -->
    <div style="width: 100%; margin-bottom: 30px;">
      <h2 style="margin-bottom: 20px; color: #8b0000;">District-wise Donor Distribution</h2>
      <div class="card" style="height: 480px; padding: 30px;">
        <canvas id="hospitalChart"></canvas>
      </div>
    </div>

    <!-- ================= BOTTOM SECTION: OVERVIEW + CARDS ================= -->
    <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 30px; width: 100%;">
      
      <!-- System Overview (Left) -->
      <div>
        <h2 style="margin-bottom: 20px; color: #8b0000;">System Overview</h2>
        <div class="card" style="height: 400px; padding: 30px;">
          <canvas id="statsChart"></canvas>
        </div>
      </div>

      <!-- Quick Actions (Right) -->
      <div>
        <h2 style="margin-bottom: 20px; color: #8b0000;">Quick Actions</h2>
        <div style="display: flex; flex-direction: column; gap: 20px;">
          
          <div class="card" onclick="location.href='register-hospital.html'" style="cursor: pointer; padding: 25px; margin-bottom: 0;">
            <h3 style="color: #8b0000; margin-bottom: 10px;">Register Hospital</h3>
            <p style="font-size: 14px; color: #666;">Add new hospital details.</p>
          </div>

          <div class="card" onclick="location.href='register-admin.html'" style="cursor: pointer; padding: 25px; margin-bottom: 0;">
            <h3 style="color: #8b0000; margin-bottom: 10px;">Register New Admin</h3>
            <p style="font-size: 14px; color: #666;">Add a new admin to the system.</p>
          </div>

          <div class="card" onclick="location.href='view-users.html'" style="cursor: pointer; padding: 25px; margin-bottom: 0;">
            <h3 style="color: #8b0000; margin-bottom: 10px;">View Users</h3>
            <p style="font-size: 14px; color: #666;">See all registered users.</p>
          </div>

        </div>
      </div>

    </div>
  </div>

  <script>
    async function loadStats() {
      const t = localStorage.getItem("token");
      try {
        const [statsRes, distRes] = await Promise.all([
          fetch((window.location.hostname === "localhost" ? "http://localhost:5000" : "") + "/api/admin/stats", {
            headers: { Authorization: "Bearer " + t }
          }),
          fetch((window.location.hostname === "localhost" ? "http://localhost:5000" : "") + "/api/admin/donor-distribution", {
            headers: { Authorization: "Bearer " + t }
          })
        ]);

        if (!statsRes.ok || !distRes.ok) return;

        const stats = await statsRes.json();
        const distData = await distRes.json();

        /* ================= OVERVIEW BAR CHART ================= */
        const ctx1 = document.getElementById("statsChart").getContext("2d");
        new Chart(ctx1, {
          type: "bar",
          data: {
            labels: ["Clients", "Hospitals", "Admins"],
            datasets: [
              {
                label: "Total Count",
                data: [stats.clients, stats.hospitals, stats.admins],
                backgroundColor: ["#8b0000", "#a80000", "#d32f2f"],
                borderRadius: 12,
                barThickness: 45,
              },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
              x: { grid: { display: false } },
              y: { 
                beginAtZero: true, 
                grid: { color: "#eee" },
                ticks: { precision: 0 }
              },
            },
          },
        });

        /* ================= DISTRICT DONOR BAR CHART ================= */
        const ctx2 = document.getElementById("hospitalChart").getContext("2d");
        new Chart(ctx2, {
          type: "bar",
          data: {
            labels: distData.map(d => d.district_name),
            datasets: [{
              label: "Donors",
              data: distData.map(d => parseInt(d.donor_count)),
              backgroundColor: "#8b0000",
              borderRadius: 8,
              barPercentage: 0.8,
              categoryPercentage: 0.9
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { 
               legend: { display: false },
               tooltip: { enabled: true }
            },
            scales: {
              x: { 
                grid: { display: false },
                ticks: { 
                    font: { size: 9, weight: 'bold' },
                    maxRotation: 0,
                    minRotation: 0,
                    autoSkip: false
                }
              },
              y: { 
                beginAtZero: true, 
                grid: { color: "#eee" },
                ticks: { stepSize: 1, precision: 0 }
              },
            },
          },
        });

      } catch (err) {
        console.error("DASHBOARD ERROR:", err);
      }
    }

    loadStats();
  </script>
  <script src="../auth.js"></script>
  <script src="../logout.js"></script>
</body>
</html>
