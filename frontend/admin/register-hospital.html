<!doctype html>
<html>

<head>
  <title>Register Hospital</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>

<body>
  <div class="sidebar">
    <h2>Admin</h2>
    <a href="admin-dashboard.html">Home</a>
    <a href="#">Register Hospital</a>
    <a href="register-admin.html">Register Admin</a>
    <a href="view-users.html">View Users</a>
    <a href="#" onclick="logout(); return false;" style="margin-top: auto;">Logout</a>
  </div>

  <div class="main">
    <h1>Register Hospital</h1>

    <form class="form-container" id="regForm" onsubmit="event.preventDefault(); registerHospital();">
      <div class="form-group">
        <label>Hospital Username:</label>
        <input type="text" id="username" required />
      </div>

      <div class="form-group">
        <label>Hospital Name:</label>
        <input type="text" id="name" required />
      </div>

      <div class="form-group">
        <label>Contact No:</label>
        <input type="text" id="mobile_no" required />
      </div>

      <div class="form-group">
        <label>District:</label>
        <select id="district" required>
          <option value="">Select District</option>
        </select>
      </div>

      <div class="form-group">
        <label>City:</label>
        <select id="city" required>
          <option value="">Select City</option>
        </select>
      </div>

      <div class="form-group">
        <label>Email:</label>
        <input type="email" id="gmail" required />
      </div>

      <div class="form-group">
        <label>Password:</label>
        <input type="password" id="password" required />
      </div>

      <button type="submit">Register Hospital</button>
    </form>
  </div>
  <script src="admin-reg.js"></script>
  <script src="../auth.js"></script>
  <script src="../logout.js"></script>
</body>

</html>
